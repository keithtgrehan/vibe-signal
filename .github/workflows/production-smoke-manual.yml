name: Production Smoke Manual

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Backend base URL."
        default: "https://vibe-signal.onrender.com"
        required: true
      expected_git_commit:
        description: "Optional expected backend git commit."
        required: false

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Verify deployed version
        run: |
          if [ -n "${{ github.event.inputs.expected_git_commit }}" ]; then
            python scripts/verify_deployed_version.py --base-url "${{ github.event.inputs.base_url }}" --expected-git-commit "${{ github.event.inputs.expected_git_commit }}"
          else
            python scripts/verify_deployed_version.py --base-url "${{ github.event.inputs.base_url }}"
          fi
      - name: Production analyze smoke
        run: python scripts/smoke_test_production_analyze.py --base-url "${{ github.event.inputs.base_url }}"
