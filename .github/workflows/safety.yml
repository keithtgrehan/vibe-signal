name: Safety

on:
  pull_request:
  push:
    branches: [main]

jobs:
  safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Public copy safety
        run: python scripts/check_public_copy_safety.py
      - name: No raw content leaks
        run: python scripts/check_no_raw_content_leaks.py
      - name: Restricted artifact check
        run: python scripts/check_vibe_restricted_artifacts.py --staged
      - name: Agent control-room check
        run: |
          if [ -f scripts/agent_control_room_check.py ]; then
            python scripts/agent_control_room_check.py
          else
            echo "agent control-room checker not present; skipping"
          fi
      - name: Whitespace
        run: git diff --check
