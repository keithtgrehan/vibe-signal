name: Web

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        run: npm ci
      - name: Web tests
        run: npm test
      - name: Web build
        run: npm run build
      - name: Private metadata exposure in web bundle
        run: python ../scripts/check_private_metadata_exposure.py --include-web-dist
