name: Closed Beta Gate Manual

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Backend base URL."
        default: "https://vibe-signal.onrender.com"
        required: true
      expected_git_commit:
        description: "Optional expected backend git commit for deployed-version proof."
        required: false

jobs:
  closed-beta-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Run closed-beta gate
        env:
          EXPECTED_GIT_COMMIT: ${{ github.event.inputs.expected_git_commit }}
          CLOSED_BETA_GATE_REPORT_OUT: reports/automation/closed_beta_gate_report.md
        run: bash scripts/closed_beta_gate_all.sh "${{ github.event.inputs.base_url }}"
      - name: Upload gate report
        uses: actions/upload-artifact@v4
        with:
          name: closed-beta-gate-report
          path: reports/automation/closed_beta_gate_report.md
