  <text x="92" y="268" fill="#E8EAF0" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900">Understand message patterns</text>
  <text x="92" y="350" fill="#E8EAF0" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900">without guessing motives.</text>
