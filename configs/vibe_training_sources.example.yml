    source_name: GoEmotions
    source_url_or_path: https://github.com/google-research/google-research/tree/master/goemotions
    modality: text
    task_type: emotion_annotation_benchmark
    license_or_terms_summary: Metadata-only reference; license and terms require review before any raw-body use.
    rights_tier: publicly_available
    allowed_storage: metadata_only
    allowed_commit: true
    allowed_training_use: "no"
    allowed_eval_use: benchmark_only
    raw_body_allowed: false
    metadata_only: true
    safe_vibe_use:
      - Compare annotation taxonomy shape against Vibe communication-pattern labels.
    blocked_vibe_use:
      - Treat labels as true emotion.
      - Train product models by default.
    notes: Dataset labels are annotator judgments, not truth.
