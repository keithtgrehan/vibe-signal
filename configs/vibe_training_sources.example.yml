  - source_id: meld
    name: MELD
    modality: multimodal
    task: local_noncommercial_transcript_research_augmentation
    license_name: GPL-3.0 Hugging Face and repository metadata with TV-show transcript and media-rights constraints
    license_url: https://huggingface.co/datasets/declare-lab/MELD
    download_method: manual_local_cache_only_no_auto_download
    access_notes: MELD contains TV-show transcript utterances with emotion and sentiment labels plus audio/video files. Vibe tooling may use local text CSV rows only after the local manifest confirms GPL-3.0 metadata, text-only use, and no audio/video use.
    training_use_allowed: true
    commercial_use_allowed: false
    research_only: true
    rights_tier: gpl_3_local_nc_research
    usage: local_noncommercial_research_augmentation_only
    safe_vibe_use:
      - Local text-only non-commercial weak cue-candidate augmentation with aggregate-only reporting.
      - Source-stratified research comparison that treats emotion and sentiment labels as weak signals, not internal truth.
    blocked_vibe_use:
      - Auto-download MELD rows or media.
      - Commit transcript rows, audio, video, vectors, embeddings, checkpoints, model artifacts, or local caches.
      - Train production or commercial models.
      - Analyze faces, voices, or bodies for biometric or identity conclusions.
      - Make public model-quality, emotion-truth, hidden-intent, attraction, deception, diagnosis, manipulation, abuse, or relationship-outcome claims.
    registry_status: local_noncommercial_research_augmentation_allowed
    notes: Local non-commercial research augmentation candidate; commercial use, production use, raw data commits, audio/video use, and public model-quality claims remain blocked.

