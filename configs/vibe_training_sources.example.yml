training_sources_version: vibe_training_sources_rights_gates_v1
description: Metadata-only Vibe training source rights registry. This file does not authorize dataset download, raw data commits, provider fetching, model training, vector generation, or production ML readiness.
sources:
  - source_id: synthetic_vibe_matching
    name: Synthetic Vibe Matching Fixtures
    modality: text
    task: communication_fit_research_training
    license_name: Synthetic hand-authored fixtures created for Vibe Signal tests and research-only scaffolding
    license_url: metadata://synthetic/vibe-matching-fixtures
    download_method: committed_synthetic_fixture
    access_notes: Rows live under data/vibe_matching/synthetic/ and are not copied from private chats, external datasets, or provider responses.
    training_use_allowed: true
    commercial_use_allowed: false
    research_only: true
    rights_tier: synthetic_fixture
    usage: synthetic_only
    safe_vibe_use:
      - Research-only baseline training and deterministic evaluation scaffolding for observable communication-fit labels.
    blocked_vibe_use:
      - Treat synthetic fixtures as real user chats.
      - Make public model-quality claims from synthetic-only metrics.
      - Use as commercial training data without separate commercial rights approval.
    registry_status: research_only_training_allowed
    notes: Synthetic matching fixtures are the only training-ready source in this registry for the Vibe matching v0 build.

  - source_id: goemotions
    name: GoEmotions
    modality: text
    task: local_research_augmentation_for_observable_cue_candidates
    license_name: Apache-2.0 confirmed from Hugging Face dataset metadata and Google Research repository license; Reddit-derived rows remain local-only research data
    license_url: https://huggingface.co/datasets/google-research-datasets/go_emotions
    download_method: local_cache_only_via_explicit_tool
    access_notes: Google Research describes GoEmotions as Reddit-derived English comments labeled with 27 emotion categories or neutral. Local tooling may cache simplified train/validation/test rows only after Apache-2.0 metadata confirmation; no raw rows may be committed.
    training_use_allowed: true
    commercial_use_allowed: false
    research_only: true
    rights_tier: apache_2_local_research
    usage: local_research_augmentation_only
    safe_vibe_use:
      - Local research-only weak cue-candidate augmentation after Apache-2.0 metadata confirmation.
      - Aggregate-only source-stratified benchmark reporting that treats emotion labels as weak signals, not internal truth.
    blocked_vibe_use:
      - Commit raw Reddit comments, local cache files, vectors, embeddings, checkpoints, or model artifacts.
      - Train production or commercial models.
      - Download, commit, embed, or expose raw Reddit comments.
      - Treat annotator labels as internal user truth.
      - Make public model-quality, emotion-truth, hidden-intent, attraction, deception, diagnosis, manipulation, abuse, or relationship-outcome claims.
    registry_status: local_research_augmentation_allowed
    notes: "Local research augmentation candidate; commercial use, production use, raw data commits, and public model-quality claims remain blocked."

  - source_id: tweeteval_sentiment
    name: TweetEval Sentiment
    modality: text
    task: sentiment_benchmark_metadata_reference
    license_name: TweetEval repository terms plus Twitter/X content terms require review before any row access
    license_url: https://github.com/cardiffnlp/tweeteval
    download_method: none_reference_only
    access_notes: TweetEval includes seven tweet-classification tasks; this entry covers sentiment metadata only with positive, neutral, and negative labels. No tweet text, IDs, or exports are downloaded or committed.
    training_use_allowed: false
    commercial_use_allowed: false
    research_only: true
    rights_tier: manual-review
    usage: sentiment_benchmark_metadata_only
    safe_vibe_use:
      - Metadata-only benchmark planning for positive, neutral, and negative sentiment task shape.
      - Sentiment-subset citation and attribution planning before any future gated benchmark access.
    blocked_vibe_use:
      - Use TweetEval emotion or other subsets unless their licenses and source terms are separately verified.
      - Download, commit, embed, or expose tweet text, tweet IDs, or derived tweet exports.
      - Train product or research models without explicit source-rights approval.
    registry_status: benchmark_metadata_only
    notes: Sentiment-only benchmark metadata candidate; no raw TweetEval data is authorized by this registry.

  - source_id: civil_comments
    name: Civil Comments
    modality: text
    task: safety_boundary_reference
    license_name: Kaggle competition and source terms; Vibe treats rows as reference-only until license support for training and commercial use is verified
    license_url: https://www.kaggle.com/c/jigsaw-unintended-bias-in-toxicity-classification/rules
    download_method: none_reference_only
    access_notes: Kaggle/source terms require review before access; no comments or labels are downloaded or committed by this registry.
    training_use_allowed: false
    commercial_use_allowed: false
    research_only: false
    rights_tier: manual-review
    usage: reference_only
    safe_vibe_use:
      - Review published bias and safety caveats for Vibe safety-gate design.
    blocked_vibe_use:
      - Infer protected traits or user intent from comments.
      - Train models or commit raw comments without explicit rights approval.
    registry_status: reference_only
    notes: "Conservative posture: training and commercial use remain blocked unless explicit rights support is verified."

  - source_id: dailydialog
    name: DailyDialog
    modality: text
    task: dialogue_act_metadata_reference
    license_name: Non-commercial research terms
    license_url: https://aclanthology.org/I17-1099/
    download_method: dry_run_only_no_download
    access_notes: Metadata-only registry entry; no download is performed by the tooling in this repository.
    training_use_allowed: false
    commercial_use_allowed: false
    research_only: true
    rights_tier: NC
    usage: metadata_eval_only
    safe_vibe_use:
      - Metadata-only/eval-planning comparison of dialogue-act structure for explicit asks, topic shifts, and repair-message framing.
    blocked_vibe_use:
      - Training, fine-tuning, embeddings, or corpus creation.
      - Commercial training or product model training.
      - Commit raw conversations or treat rows as Vibe gold labels.
    registry_status: research_eval_only_metadata
    notes: Non-commercial research/eval metadata only; no commercial training or product model use.

