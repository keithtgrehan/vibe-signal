training_sources_version: vibe_training_sources_rights_gates_v1
description: Metadata-only Vibe training source rights registry. This file does not authorize dataset download, raw data commits, provider fetching, model training, vector generation, or production ML readiness.
sources:
  - source_id: goemotions
    name: GoEmotions
    modality: text
    task: emotion_taxonomy_reference
    license_name: Apache-2.0 repository license; Vibe treats dataset rows as reference-only until dataset-specific training and privacy review is complete
    license_url: https://github.com/google-research/google-research/blob/master/LICENSE
    download_method: none_reference_only
    access_notes: Official repository metadata may be reviewed by URL only; no rows are downloaded or committed by this registry.
    training_use_allowed: false
    commercial_use_allowed: false
    research_only: false
    rights_tier: manual-review
    usage: reference_only
    safe_vibe_use:
      - Compare annotation taxonomy shape against Vibe observable communication-pattern labels.
    blocked_vibe_use:
      - Train product or research models without a completed dataset-specific rights, privacy, and safety review.
      - Treat annotator labels as internal user truth.
    registry_status: reference_only
    notes: "Conservative posture: training and commercial use remain blocked here unless explicit rights support is separately documented."

  - source_id: civil_comments
    name: Civil Comments
    modality: text
    task: safety_boundary_reference
    license_name: Kaggle competition and source terms; Vibe treats rows as reference-only until license support for training and commercial use is verified
    license_url: https://www.kaggle.com/c/jigsaw-unintended-bias-in-toxicity-classification/rules
    download_method: none_reference_only
    access_notes: Kaggle/source terms require review before access; no comments or labels are downloaded or committed by this registry.
    training_use_allowed: false
    commercial_use_allowed: false
    research_only: false
    rights_tier: manual-review
    usage: reference_only
    safe_vibe_use:
      - Review published bias and safety caveats for Vibe safety-gate design.
    blocked_vibe_use:
      - Infer protected traits or user intent from comments.
      - Train models or commit raw comments without explicit rights approval.
    registry_status: reference_only
    notes: "Conservative posture: training and commercial use remain blocked unless explicit rights support is verified."

  - source_id: dailydialog
    name: DailyDialog
    modality: text
    task: dialogue_act_research_training
    license_name: Non-commercial research terms
    license_url: https://aclanthology.org/I17-1099/
    download_method: dry_run_only_no_download
    access_notes: Research-only registry entry; no download is performed by the dry-run tooling in this repository.
    training_use_allowed: true
    commercial_use_allowed: false
    research_only: true
    rights_tier: NC
    usage: research_only
    safe_vibe_use:
      - Research-only comparison of dialogue-act structure for explicit asks, topic shifts, and repair-message framing.
    blocked_vibe_use:
      - Commercial training or product model training.
      - Commit raw conversations or treat rows as Vibe gold labels.
    registry_status: research_only_training_allowed
    notes: Allowed only for research-only experiments after separate local access approval; commercial mode must reject it.

  - source_id: empathetic_dialogues
    name: EmpatheticDialogues
    modality: text
    task: supportive_response_research_training
    license_name: Non-commercial research terms
    license_url: https://aclanthology.org/P19-1534/
    download_method: dry_run_only_no_download
    access_notes: Research-only registry entry; no download is performed by the dry-run tooling in this repository.
    training_use_allowed: true
    commercial_use_allowed: false
    research_only: true
    rights_tier: NC
    usage: research_only
    safe_vibe_use:
      - Research-only comparison of supportive phrasing patterns for clarity and repair-message scaffolds.
    blocked_vibe_use:
      - Commercial training or product generation.
      - Claim labels reveal internal emotional states.
    registry_status: research_only_training_allowed
    notes: Allowed only for research-only experiments after separate local access approval; commercial mode must reject it.

  - source_id: meld
    name: MELD
    modality: multimodal
    task: multimodal_benchmark_reference
    license_name: Research benchmark terms with underlying media-rights restrictions
    license_url: https://affective-meld.github.io/
    download_method: none_eval_only
    access_notes: Media and transcript rights require explicit review; this registry allows metadata-only benchmark tracking.
    training_use_allowed: false
    commercial_use_allowed: false
    research_only: true
    rights_tier: eval-only
    usage: eval_only
    safe_vibe_use:
      - Track benchmark categories for future evaluation design discussions.
    blocked_vibe_use:
      - Train on text, audio, or video rows.
      - Analyze faces, voices, or bodies for biometric or identity conclusions.
    registry_status: eval_only
    notes: Eval-only/reference posture unless explicit commercial and training rights are verified.

